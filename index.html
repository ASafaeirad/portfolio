<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASafaeirad</title>
    <meta name="description" content="Alireza Safaeirad's personal website" />
    <link rel="author" href="https://github.com/ASafaeirad/" />
    <meta name="author" content="Alireza Safaeirad" />
    <meta
      name="keywords"
      content="Alireza Safaeirad, Asafaeirad, personal website, portfolio, blog, projects, about me"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Labrada&display=swap" rel="stylesheet" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="preload" as="image" href="images/deer.png" />
    <link rel="preload" as="image" href="images/man.png" />
  </head>
  <body>
    <div class="container">
      <div class="deer"><img src="/images/deer.png" alt="Deer" /></div>
      <div class="content">
        <h1 class="heading">ASafaeirad</h1>
        <p class="description">
          <a href="https://www.github.com/asafaeirad/" target="_blank">GitHub</a>
          <a href="https://www.linkedin.com/in/asafaeirad/" target="_blank">LinkedIn</a>
        </p>
      </div>
      <div class="man"><img src="/images/man.png" alt="Man" /></div>
    </div>
    <svg xmlns="http://www.w3.org/2000/svg" version="1.1">
      <title>Squiggly Filters</title>
      <defs>
        <filter id="squiggly-0">
          <feTurbulence
            id="turbulence"
            baseFrequency="0.1"
            numOctaves="3"
            result="noise"
            seed="0"
          />
          <feDisplacementMap id="displacement" in="SourceGraphic" in2="noise" scale="1" />
        </filter>
        <filter id="squiggly-1">
          <feTurbulence
            id="turbulence"
            baseFrequency="0.1"
            numOctaves="3"
            result="noise"
            seed="1"
          />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" />
        </filter>

        <filter id="squiggly-2">
          <feTurbulence id="turbulence" baseFrequency="1" numOctaves="3" result="noise" seed="2" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" />
        </filter>
        <filter id="squiggly-3">
          <feTurbulence
            id="turbulence"
            baseFrequency="1.2"
            numOctaves="3"
            result="noise"
            seed="3"
          />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" />
        </filter>

        <filter id="squiggly-4">
          <feTurbulence
            id="turbulence"
            baseFrequency="0.5"
            numOctaves="3"
            result="noise"
            seed="4"
          />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" />
        </filter>
      </defs>
    </svg>
    <script type="module" src="./src/script.js"></script>
  </body>
</html>
